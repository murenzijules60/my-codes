<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Medicine - Gikonko Health Center</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7f5;
  }
.header {
    background: #0b5d2a;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.nav a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-size: 15px;
}
img{
        height: 50px;
        width: 40px;
        padding-top: 0px;
    }
  header {
    background: #0b5d2a;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
  }

  .card img {
    width: 100px;
    height: 100px;
    object-fit: contain;
  }

  .card h3 {
    margin: 10px 0 5px;
  }

  .price {
    color: #0b5d2a;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .btn {
    background: #0b5d2a;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
  }
  .btn2{
    background: #0b5d2a;
    color: white;
    border: none;
     padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
  }

  .btn:hover {
    background: #094a22;
  }

  .cart {
    margin-top: 30px;
    background: white;
    padding: 15px;
    border-radius: 10px;
  }

  .cart h2 {
    margin-top: 0;
  }

  .cart-item {
    display: flex;
    justify-content: space-between;
    margin: 5px 0;
  }

  .checkout {
    margin-top: 10px;
    width: 100%;
  }
   a{
        text-decoration: none;
        color: white;
        font-size: medium;
    }
</style>
</head>

<body>
<div class="header">
    <div class="logo"><img src="gikonko.jpeg" alt="">GIKONKO Health Center</div>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact us</a>
        <a href="#">Pharmacy</a>
    </div>
</div>
<header>
  Gikonko Health Center Pharmacy
</header>

<div class="container">

  <div class="grid">

    <div class="card">
      <img src="paracet.jpg" alt="">
      <h3>Paracetamol</h3>
      <p class="price">2,000 RWF</p>
      <button class="btn" onclick="addToCart('Paracetamol', 2000)">Add to Buy</button>
    </div>

    <div class="card">
      <img src="amox.jpg" alt="">
      <h3>Amoxicillin</h3>
      <p class="price">5,000 RWF</p>
      <button class="btn" onclick="addToCart('Amoxicillin', 5000)">Add to Buy</button>
    </div>

    <div class="card">
      <img src="ibu.jpg" alt="">
      <h3>Ibuprofen</h3>
      <p class="price">3,000 RWF</p>
      <button class="btn" onclick="addToCart('Ibuprofen', 3000)">Add to Buy</button>
    </div>

  </div>

  <div class="cart">
    <h2>Your Buy</h2>
    <div id="cart-items"></div>
    <p><strong>Total: <span id="total">0</span> RWF</strong></p>
    <button class="btn2"><a href="meet.html">Submit</button></a>
  </div>

</div>

<script>
  let cart = [];
  let total = 0;

  function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    displayCart();
  }

  function displayCart() {
    const cartItems = document.getElementById("cart-items");
    cartItems.innerHTML = "";

    cart.forEach(item => {
      const div = document.createElement("div");
      div.classList.add("cart-item");
      div.innerHTML = `<span>${item.name}</span><span>${item.price} RWF</span>`;
      cartItems.appendChild(div);
    });

    document.getElementById("total").innerText = total;
  }

 
</script>

</body>
</html>
