<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top Menu UI</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
  }

  .navbar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: #f0f0f0;
    height: 60px;
    border-bottom: 1px solid #ccc;
  }

  .nav-item {
    font-size: 22px;
    color: gray;
    cursor: pointer;
    padding: 10px;
    position: relative;
  }

  .nav-item.active {
    color: #1877f2;
  }

  .nav-item.active::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 100%;
    height: 3px;
    background: #1877f2;
    border-radius: 5px;
  }
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-item active" onclick="setActive(this)">🏠</div>
  <div class="nav-item" onclick="setActive(this)">👥</div>
  <div class="nav-item" onclick="setActive(this)">🎮</div>
  <div class="nav-item" onclick="setActive(this)">☰</div>
  <div class="nav-item" onclick="setActive(this)">💬</div>
</div>

<script>
function setActive(element) {
  let items = document.querySelectorAll('.nav-item');
  items.forEach(item => item.classList.remove('active'));
  element.classList.add('active');
}
</script>

</body>
</html>
